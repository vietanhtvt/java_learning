spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Disable Redis cache auto-config (overridden by DynamicPropertySource)
  cache:
    type: redis

  kafka:
    consumer:
      auto-offset-reset: earliest

jwt:
  secret: test-secret-key-for-integration-tests-must-be-long-enough
  expiration-ms: 3600000
  refresh-expiration-ms: 86400000

logging:
  level:
    com.taskflow: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
